name: Secrets Scan (TruffleHog)

# Layered defense (Kovael-Security-Audit §3 "Three-Layer Defense"):
#   1. Local pre-commit (developer's machine)
#   2. PII Guard (forbidden-string diff scan)
#   3. CI verified-secrets scan (this workflow) — pings providers to confirm
#      the secret is live and rotatable, so any positive is actionable.
#
# We use --only-verified to keep signal-to-noise high.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly drift check — Mondays 14:00 UTC
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog verified scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # TODO: SHA-pin via Dependabot
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main # TODO: SHA-pin once verified
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # --exclude-paths reads a file with one path-glob per line.
          # .trufflehogignore lives at repo root and excludes test fixtures
          # (which contain mock hashes / high-entropy strings by design),
          # plus dist/ and node_modules/.
          extra_args: --only-verified --no-update --exclude-paths=.trufflehogignore
