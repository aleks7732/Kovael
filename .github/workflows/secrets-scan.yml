name: Secrets Scan (TruffleHog)

# Layered defense (Kovael-Security-Audit §3 "Three-Layer Defense"):
#   1. Local pre-commit (developer's machine)
#   2. PII Guard (forbidden-string diff scan)
#   3. CI verified-secrets scan (this workflow) — pings providers to confirm
#      the secret is live and rotatable, so any positive is actionable.
#
# We use --only-verified to keep signal-to-noise high.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly drift check — Mondays 14:00 UTC
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: secrets-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trufflehog:
    name: TruffleHog verified scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.95.3 # Pinned to stable release
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          # --no-update is already injected by the action's Docker entrypoint;
          # repeating it causes `flag 'no-update' cannot be repeated` → exit 1.
          # --exclude-paths reads .trufflehogignore (repo root, one glob per line)
          # to suppress high-entropy test fixtures, lockfile hashes, and dist/.
          extra_args: --only-verified --exclude-paths=.trufflehogignore
