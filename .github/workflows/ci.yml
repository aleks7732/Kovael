name: CI

# Reproducible build + verification for every PR and every push to main.
# Three jobs run in parallel; the workflow succeeds only when all three pass.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-frontend:
    name: Typecheck · spatial-war-room
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/spatial-war-room
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b62b6d0ad9b0af0fb3b1e40be53ce9b9 # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/spatial-war-room/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck (tsc -b)
        run: npx tsc -b

  typecheck-backend:
    name: Typecheck · orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b62b6d0ad9b0af0fb3b1e40be53ce9b9 # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck (root tsconfig)
        run: npx tsc --noEmit -p tsconfig.json

  test:
    name: Vitest · orchestrator unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@1d0ff469b62b6d0ad9b0af0fb3b1e40be53ce9b9 # v4.2.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Run tests
        run: npx vitest run --reporter=default
