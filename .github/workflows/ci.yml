name: CI

# Reproducible build + verification for every PR and every push to main.
# Three jobs run in parallel; the workflow succeeds only when all three pass.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, 'claude/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-frontend:
    name: Typecheck · spatial-war-room
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: packages/spatial-war-room
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/spatial-war-room/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck (tsc -b)
        run: npx tsc -b
      - name: Typecheck test fixtures (tsconfig.test.json)
        # tsconfig.app.json only includes `src`, so test fixtures could
        # silently drift from production types (caught by Copilot review
        # on PR #17 where a HardwareTelemetry fixture was missing required
        # fields). This step keeps the test/ tree on the same type leash
        # as src/.
        run: npx tsc --noEmit -p tsconfig.test.json

  typecheck-backend:
    name: Typecheck · orchestrator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck (root tsconfig)
        run: npx tsc --noEmit -p tsconfig.json

  test:
    name: Vitest · orchestrator unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Run tests
        run: npx vitest run --reporter=default

  linux-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
